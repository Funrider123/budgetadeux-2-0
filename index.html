/* ── Simulation Pilotage : état de session (non persisté tant que non validé) ── */
let pilotSim = {};        // id projet -> mensualité simulée
let pilotOpen = {charges:false, categories:false, perso_lui:false, perso_elle:false}; // repliées par défaut (plus compact)
function sliderMax(val, floor){ return val>0 ? Math.ceil(val*2/50)*50 : floor; }
function initPilotSim(){
  S.projects.filter(p=>p.status==="actif").forEach(p=>{
    if(pilotSim[p.id]===undefined){
      const remaining=Math.max(0,p.target-p.saved);
      pilotSim[p.id] = p.months>0 ? Math.round(remaining/p.months) : 0;
    }
  });
}
function totalAllocProjects(){ return S.projects.filter(p=>p.status==="actif").reduce((s,p)=>s+(pilotSim[p.id]||0),0); }
function projectEta(p, mensuel){
  const remaining=Math.max(0,p.target-p.saved);
  if(remaining<=0) return {label:'✓ Atteint', color:'var(--ok)'};
  if(mensuel<=0) return {label:'∞ — aucun versement', color:'var(--danger)'};
  const days=Math.ceil(remaining/mensuel*30.4368);
  const d=new Date(); d.setDate(d.getDate()+days);
  return {label:'→ '+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}), color:'var(--terra)'};
}
function pilotRow(opts){
  // Ligne compacte réutilisée pour charges fixes / catégories : nom (+ classification), tag optionnel, input€ + slider.
  const {id,name,sub,cls,amount,max,onInputAttr,delAttr,editAttr}=opts;
  return `<div class="pilot-row">
    ${delAttr?`<button class="pdel" ${delAttr}>✕</button>`:''}
    <div class="pmain">
      <div class="pnm-row">
        <span class="pnm">${name}${cls?` <span class="small muted" style="font-weight:500">(${cls})</span>`:''}${sub?` <span class="small muted" style="font-weight:500">${sub}</span>`:''}</span>
        <input class="pamt-input" type="number" value="${Math.round(amount)}" data-id="${id}" ${onInputAttr}>
      </div>
      <input type="range" class="mini-slider" min="0" max="${max}" step="1" value="${amount}" data-id="${id}" ${onInputAttr}>
    </div>
    ${editAttr?`<button class="pdel" ${editAttr}>✎</button>`:''}
  </div>`;
}
// Carte "personne" (salaire + charges perso + contribution) — affichée pour tous les
// modes de répartition sauf "Contribution fixe". Les charges perso sont masquées en
// mode "Personnalisé aux revenus" (répartition purement déclarative, comme en V321).
function personCard(who){
  const name=nameOf(who);
  const sal=S.settings.salaries[who];
  const persoList=S.charges.filter(c=>c.scope===who);
  const persoTotal=chargesPerso(who);
  const rep=repartition();
  const mode=S.settings.mode;
  const idSal=who==='lui'?'salLui':'salElle';

  // Modes "brut" et "personnalisé" : juste le % (éditable en personnalisé, calculé en
  // brut) et le salaire, sur une ligne compacte — pas besoin de la carte plus riche
  // (charges perso, disponible...) qui ne concerne que le mode "net".
  if(mode!=='net'){
    const idPct=who==='lui'?'prepHim':'prepHer';
    const pctField = mode==='custom'
      ? `<div class="pers-pct-edit"><input type="number" min="0" max="100" id="${idPct}" value="${rep[who]}"><span>%</span></div>`
      : `<span class="pct" id="persPct_${who}">${rep[who]}%</span>`;
    return `<div class="pers-card pers-compact">
      <div class="who">👤 ${escapeHtml(name)}</div>
      ${pctField}
      <div class="pers-sal-edit"><input class="input" type="number" id="${idSal}" value="${sal}"><span>€</span></div>
    </div>`;
  }

  const open=pilotOpen['perso_'+who];
  const disponible=sal-persoTotal;
  return `<div class="pers-card">
    <div class="pers-hdr">
      <div class="who">👤 ${escapeHtml(name)} <span class="pct" id="persPct_${who}">${rep[who]}%</span></div>
      <div style="text-align:right"><span class="tot-lbl">Disponible</span><span class="tot" id="persTot_${who}">${fmt0(disponible)}</span></div>
    </div>
    <div class="pers-sal-row">
      <b>Salaire</b>
      <div class="pers-sal-edit"><input class="input" type="number" id="${idSal}" value="${sal}"><span>€</span></div>
    </div>
    <div class="pers-perso-hdr" data-toggleperso="${who}" style="pointer-events:auto">
      <b>Total charges fixes perso <span class="chev">${open?'▲':'▼'}</span></b>
      <span class="tot" id="persoTot_${who}">${fmt0(persoTotal)}</span>
    </div>
    <div class="pers-perso-list" id="persoList_${who}" style="display:${open?'block':'none'}">
      ${persoList.length?persoList.map(c=>pilotRow({
        id:c.id, name:c.name, sub:c.locked?'🔒':'',
        amount:c.amount, max:sliderMax(c.amount,500),
        onInputAttr:`data-charge oninput="onChargeInput(this)"`,
        delAttr:`data-delcharge="${c.id}"`
      })).join(''):'<p class="small muted" style="padding:8px 4px">Aucune charge perso pour le moment.</p>'}
      <div style="padding:6px 4px 2px"><span class="link" data-addpersocharge="${who}">+ Ajouter une charge perso</span></div>
    </div>
  </div>`;

// Détermine le libellé/couleur/clignotement du solde final (montant total − charges −
// catégories − épargne projets) : à 0 budget équilibré, négatif déficit (clignote),
// positif excédent.
function budgetSoldeInfo(solde){
  if(solde===0) return {label:'⚖️ Budget équilibré', color:'#fff', bg:'var(--ok)', blink:false,
    tip:''};
  if(solde<0) return {label:'⚠️ Budget en déficit', color:'var(--danger)', bg:'#fff', blink:true,
    tip:''};
  return {label:'✅ Budget en excédent', color:'#fff', bg:'transparent', blink:false,
    tip:'💡 Vous pouvez augmenter une catégorie, ajouter à un projet, ou verser moins pour revenir à l\'équilibre.'};
}
// Récapitulatif des grosses rubriques du mois, pour rendre immédiatement visible

// Même famille visuelle (panel-terra) que les autres blocs de synthèse de l'écran.

  const totalMensuel=totalRevenuFoyer(), chg=chargesCommunes(), cat=totalBudget(), proj=totalAllocProjects();

    <div class="between ${info.blink?'blink-danger':''}" style="padding:12px 14px; margin-top:10px; border-radius:12px; background:${info.bg}; ${info.bg==='transparent'?'border-top:2px solid rgba(255,255,255,.35); padding-left:0; padding-right:0':''}" id="recapRow">

// Récap des virements, organisé par personne (plutôt que par compte) : ce que chacun verse
// au total, décomposé en compte commun (charges + catégories, réparti selon le mode choisi)
// + compte projets (réparti selon la répartition propre à CHAQUE projet, qui peut différer
// de celle du compte commun).

  const luiCommun=totVerser*rep.lui/100, elleCommun=totVerser*rep.elle/100;
  const luiProjet=activeProjects.reduce((s,p)=>s+(pilotSim[p.id]||0)*(p.split?p.split.lui:50)/100,0);

    </div>`;
  return `<div class="card" style="margin-top:18px">

}

async function callDeleteAccount(mode){
  const { data:{ session } } = await sb.auth.getSession();
  const token = session?.access_token;
  if(!token) throw new Error("Session expirée, reconnectez-vous.");
  const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-account`, {
    method:'POST',
    headers:{ 'Authorization':`Bearer ${token}`, 'apikey':SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({ mode })
  });
  const out = await res.json().catch(()=>({}));
  if(!res.ok || out.error) throw new Error(out.error || ('HTTP '+res.status));
  return out;
}
// Après suppression du compte : on vide l'appareil et on repart à zéro.
async function wipeLocalAndRestart(){
  try{ stopSync(); }catch(_){}
  try{ await sb.auth.signOut(); }catch(_){}
  try{ localStorage.removeItem('bad2'); localStorage.removeItem('bad2_device'); }catch(_){}
  location.reload();
}

function bindAjouter(){
  const a=$('#dAmount'); if(a) a.oninput=ev=>{draft.amount=ev.target.value; updateAjouterValidity();};
  const d=$('#dDesc'); if(d) d.oninput=ev=>{
    draft.desc=ev.target.value;
    const wasTransfer=/transfert|virement/i.test(draft._last||'');
    const isTransferNow=/transfert|virement/i.test(ev.target.value);
    draft._last=ev.target.value;
    if(isTransferNow!==wasTransfer){ go('ajouter'); const el=$('#dDesc'); if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }
    else updateAjouterValidity();
  };
  const dt=$('#dDate'); if(dt) dt.onchange=ev=>{draft.date=ev.target.value; go('ajouter');};
  const mo=$('#dMoreToggle'); if(mo) mo.onclick=()=>{draft._showMore=!draft._showMore; go('ajouter');};
  const p=$('#dPrev'); if(p) p.onclick=()=>{draft.prevision=!draft.prevision; go('ajouter');};
  document.querySelectorAll('[data-whopick]').forEach(b=>b.addEventListener('click',()=>{draft.who=b.dataset.whopick; go('ajouter');}));
  document.querySelectorAll('[data-catpick]').forEach(b=>b.addEventListener('click',()=>{draft.cat=b.dataset.catpick; go('ajouter');}));
  document.querySelectorAll('[data-merchpick]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.merchpick;
    draft.merchant = draft.merchant===id ? "" : id;
    if(draft.merchant){ const m=S.merchants.find(x=>x.id===id); if(m) draft.cat=m.cat; }

  }));

  const s=$('#dSave'); if(s) s.onclick=saveExpense;

  openModal(`<h3>Nouvelle enseigne favorite</h3>

function saveExpense(){
  const amt=parseFloat((draft.amount+"").replace(',','.'));
  if(!amt||amt<=0){ toast("Indiquez un montant valide","💶"); return; }
  if(!draft.cat){ toast("Choisissez une catégorie","🏷️"); return; }
  if(!draft.merchant && !draft.desc.trim()){ toast("Ajoutez un commerce ou une description","✏️"); return; }
  if(draft.cat==='__cagnotte__' && amt>S.cagnotte.balance){ toast("Le montant dépasse le solde de la cagnotte commune","👛"); return; }
  const isTransfer=/transfert|virement/i.test(draft.desc);
  const isCagnotte=draft.cat==='__cagnotte__';
  const merchant = draft.merchant ? S.merchants.find(m=>m.id===draft.merchant) : null;
  const descText = draft.desc.trim();
  const finalDesc = merchant && descText ? `${merchant.name} — ${descText}` : (merchant ? merchant.name : (descText || catById(draft.cat).name));
  const exp={id:e(), amount:amt, date:draft.date, desc:finalDesc, cat:draft.cat, who:draft.who||me(), type:isTransfer?'transfert':'depense', prevision:draft.prevision, cagnotte:isCagnotte, note:""};
  S.expenses.push(exp);
  if(isCagnotte && !isTransfer){ S.cagnotte.balance-=amt; S.cagnotte.history.unshift({date:draft.date,label:exp.desc,amount:-amt}); }
  if(isTransfer){ S.cagnotte.balance+=amt; S.cagnotte.history.unshift({date:draft.date,label:exp.desc,amount:+amt}); }
  const wasPrevision=draft.prevision;
  save();
  draft={amount:"", date:iso(0), desc:"", cat:"", merchant:"", prevision:false, cagnotte:false, who:""};
  toast(isTransfer?"Transfert enregistré 🔁":wasPrevision?"Prévision ajoutée 🔮":"Dépense ajoutée — bien joué !","✓");
  go('vue');
}

    if(dest==='cagnotte'){ S.cagnotte.balance+=amt; S.cagnotte.history.unshift({date:iso(0),label:`Surplus ${c.name}`,amount:+amt}); }
    else { const p=S.projects.find(x=>x.id===dest); if(p){ p.saved+=amt; if(!p.history) p.history=[]; p.history.unshift({date:iso(0),label:`Surplus ${c.name}`,amount:+amt}); } }

    mdAddSurplusDecision(S.ui.mdMonth, catId, {type:'kept', amount:remaining});

function undoSurplusDecision(offset, catId, idx){
  const k=mdMonthKey(offset)+'_'+catId;
  const arr=S.moneyDate.surplusDecisions[k]; if(!arr || !arr[idx]) return;
  const decision=arr[idx];
  if(decision.type==='transferred'){
    const c=catById(catId);
    if(decision.dest==='cagnotte'){
      S.cagnotte.balance-=decision.amount;
      const hidx=S.cagnotte.history.findIndex(h=>h.label===`Surplus ${c.name}` && h.amount===decision.amount);
      if(hidx>-1) S.cagnotte.history.splice(hidx,1);
    } else { const p=S.projects.find(x=>x.id===decision.dest); if(p){ p.saved-=decision.amount; if(p.history){ const phidx=p.history.findIndex(h=>h.label===`Surplus ${c.name}` && h.amount===decision.amount); if(phidx>-1) p.history.splice(phidx,1); } } }
    if(decision.expId) S.expenses=S.expenses.filter(x=>x.id!==decision.expId);
  }
  arr.splice(idx,1);
  save();
}

function mdCategoriesDetailHtml(offset){

    rythmeHtml = `<div class="panel-terra" style="margin-bottom:14px">

      <div class="between" style="margin-top:8px; font-size:12px; opacity:.92; font-weight:700">
        <span>${usedPct}% du budget utilisé</span><span>${fmt0(budgetTotal)} prévu</span>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex; gap:14px; align-items:center">

            <div class="between small muted" style="margin-bottom:4px"><span>📅 Temps</span><span style="font-weight:700; color:var(--ink)">${periodElapsedPct}%</span></div>
            <div class="bar thin"><i style="width:${periodElapsedPct}%; background:var(--muted-2)"></i></div>
          </div>
          <div>
            <div class="between small muted" style="margin-bottom:4px"><span>💶 Dépensé</span><span style="font-weight:700; color:${onTrack?'var(--ok)':'var(--terra-d)'}">${usedPct}%</span></div>
            <div class="bar thin"><i style="width:${usedPct}%; background:${onTrack?'var(--ok)':'var(--terra-d)'}"></i></div>

          <div class="small muted" style="line-height:1.3; margin-top:4px">À ce rythme, projection fin de mois</div>
        </div>
      </div>
    </div>`;
  }
  const catsHtml = S.categories.filter(c=>c.budget>0).map(c=>{

    return `<div style="padding:11px 0; border-top:1px solid var(--line)">
      <div class="between" style="margin-bottom:8px">

function recalcPilotage(){
  const rep=repartition();
  const reste=disponiblePourProjets();
  const allocProjets=totalAllocProjects();
  const totVerser=chargesCommunes()+totalBudget();
  const fixedTotal=S.settings.fixed.lui+S.settings.fixed.elle;
  const fixedShortfall=S.settings.mode==='fixe' ? Math.max(0, totVerser-fixedTotal) : 0;

  const chgTot=$('#chgTotalLbl'); if(chgTot) chgTot.textContent=fmt0(chargesCommunes());
  const catTot=$('#catTotalLbl'); if(catTot) catTot.textContent=fmt0(totalBudget());

  const pr=$('#pilReste'); if(pr){ pr.textContent=fmt0(reste); pr.style.color=reste<0?'#FFD6C9':'#fff'; }
  const pd=$('#pilDeficit'); if(pd) pd.style.display=reste<0?'block':'none';
  const pb=$('#pilBar'); if(pb){
    pb.style.width=(reste>0?Math.min(100,allocProjets/reste*100):(allocProjets>0?100:0))+'%';
    pb.style.background=allocProjets<=reste?'var(--ok)':'var(--danger)';
  }
  const pap=$('#pilAllocPct'); if(pap) pap.textContent=`(${reste>0?Math.round(allocProjets/reste*100):(allocProjets>0?100:0)}%)`;
  S.projects.filter(p=>p.status==='actif').forEach(p=>{
    const mensuel=pilotSim[p.id]||0, eta=projectEta(p,mensuel);
    const etaEl=document.querySelector(`[data-eta="${p.id}"]`);
    if(etaEl){ etaEl.textContent=eta.label; etaEl.style.color=eta.color; }
  });

  const activeProjects=S.projects.filter(p=>p.status==='actif');
  const luiCommun=totVerser*rep.lui/100, elleCommun=totVerser*rep.elle/100;
  const luiProjet=activeProjects.reduce((s,p)=>s+(pilotSim[p.id]||0)*(p.split?p.split.lui:50)/100,0);
  const elleProjet=activeProjects.reduce((s,p)=>s+(pilotSim[p.id]||0)*(p.split?p.split.elle:50)/100,0);
  const rcl=$('#recapLuiCommun'); if(rcl) rcl.textContent=fmt(luiCommun);
  const rce=$('#recapElleCommun'); if(rce) rce.textContent=fmt(elleCommun);
  const rpl=$('#recapLuiProjet'); if(rpl) rpl.textContent=fmt(luiProjet);
  const rpe=$('#recapElleProjet'); if(rpe) rpe.textContent=fmt(elleProjet);
  const rlt=$('#recapLuiTotal'); if(rlt) rlt.textContent=`(${fmt0(luiCommun+luiProjet)})`;
  const ret=$('#recapElleTotal'); if(ret) ret.textContent=`(${fmt0(elleCommun+elleProjet)})`;
  const fw=$('#fixedWarn'); if(fw){
    fw.style.display=fixedShortfall>0?'block':'none';
    fw.textContent=`⚠️ Vos contributions fixes (${fmt0(fixedTotal)}) ne couvrent pas ce total — augmentez-les de ${fmt0(fixedShortfall)} ou réduisez vos charges/catégories.`;
  }

  // Récapitulatif "Vue d'ensemble du mois"
  const totalMensuel=totalRevenuFoyer(), chgRecap=chargesCommunes(), catRecap=totalBudget();
  const solde=totalMensuel-chgRecap-catRecap-allocProjets;
  const info=budgetSoldeInfo(solde);
  const rm=$('#recapMontant'); if(rm) rm.textContent=fmt0(totalMensuel);
  const rc=$('#recapChg'); if(rc) rc.textContent=fmt0(chgRecap);
  const rcat=$('#recapCat'); if(rcat) rcat.textContent=fmt0(catRecap);
  const rp=$('#recapProj'); if(rp) rp.textContent=fmt0(allocProjets);
  const rRow=$('#recapRow'); if(rRow){
    rRow.classList.toggle('blink-danger', info.blink);
    rRow.style.background=info.bg;
    if(info.bg==='transparent'){ rRow.style.borderTop='2px solid rgba(255,255,255,.35)'; rRow.style.paddingLeft='0'; rRow.style.paddingRight='0'; }
    else { rRow.style.borderTop='none'; rRow.style.paddingLeft='14px'; rRow.style.paddingRight='14px'; }
  }
  const rLabel=$('#recapLabel'); if(rLabel){ rLabel.textContent=info.label; rLabel.style.color=info.color; }
  const rSolde=$('#recapSolde'); if(rSolde){ rSolde.textContent=`${solde>0?'+':''}${fmt0(solde)}`; rSolde.style.color=info.color; }
  const rTip=$('#recapTip'); if(rTip){ rTip.style.display=info.tip?'block':'none'; rTip.textContent=info.tip; }

  // Cartes personne (salaire + charges perso + contribution)
  ['lui','elle'].forEach(who=>{
    const pt=$('#persTot_'+who);
    if(pt) pt.textContent = S.settings.mode==='net' ? fmt0(S.settings.salaries[who]-chargesPerso(who)) : fmt0(S.settings.salaries[who]);
    const pot=$('#persoTot_'+who); if(pot) pot.textContent=fmt0(chargesPerso(who));
    const pp=$('#persPct_'+who); if(pp) pp.textContent=`${rep[who]}%`;
  });
  const ptf=$('#persTot_fixed'); if(ptf) ptf.textContent=fmt0(totalRevenuFoyer());
}
// Synchronise l'input€ et le slider d'une même ligne (charge ou catégorie), sauvegarde, recalcule.
// Important : on ne réajuste le max du slider QUE si c'est le champ € qui a changé
// (on tape une valeur). Si c'est le slider lui-même qu'on glisse, on ne touche pas à
// son échelle — sinon le curseur reste "collé" au milieu pendant tout le glissement.
function onChargeInput(el){
  const id=el.dataset.id, val=Math.max(0, Math.round(+el.value)||0);
  const row=el.closest('.pilot-row');
  const numEl=row.querySelector('.pamt-input'), slEl=row.querySelector('.mini-slider');
  if(el===numEl){ if(slEl){ slEl.max=sliderMax(val,500); slEl.value=val; } }
  else if(numEl) numEl.value=val;
  const c=S.charges.find(x=>x.id===id); if(c){ c.amount=val; save(); }
  recalcPilotage();
}
function onCatInput(el){
  const id=el.dataset.id, val=Math.max(0, Math.round(+el.value)||0);
  const row=el.closest('.pilot-row');
  const numEl=row.querySelector('.pamt-input'), slEl=row.querySelector('.mini-slider');
  if(el===numEl){ if(slEl){ slEl.max=sliderMax(val,500); slEl.value=val; } }
  else if(numEl) numEl.value=val;
  const c=S.categories.find(x=>x.id===id); if(c){ c.budget=val; save(); }
  recalcPilotage();
}
function onProjectInput(el){
  const id=el.dataset.project, val=Math.max(0, Math.round(+el.value)||0);
  const row=el.closest('.pilot-row');
  const numEl=row.querySelector('.pamt-input'), slEl=row.querySelector('.mini-slider');
  if(el===numEl){ if(slEl){ slEl.max=sliderMax(val,Math.max(disponiblePourProjets(),100)); slEl.value=val; } }
  else if(numEl) numEl.value=val;
  pilotSim[id]=val;
  // Comme les charges/catégories/salaires, la mensualité choisie s'enregistre immédiatement
  // (au lieu d'être une simulation en mémoire seulement validée plus tard) : on la traduit
  // tout de suite en nombre de mois pour atteindre l'objectif, et on sauvegarde.
  const p=S.projects.find(x=>x.id===id);
  if(p){ const remaining=Math.max(0,p.target-p.saved); if(remaining>0 && val>0) p.months=Math.max(1,Math.ceil(remaining/val)); save(); }
  recalcPilotage();
}
function bindPilotage(){
  const br=$('#backReg'); if(br) br.onclick=()=>go(prevScreen||'reglages');

  // Le salaire est une donnée connue (pas un curseur à explorer) : simple champ €, sans slider.
  const sl=$('#salLui'), se=$('#salElle');
  const syncSalary=(who,val)=>{ S.settings.salaries[who]=Math.max(0, Math.round(val)||0); save(); recalcPilotage(); };
  if(sl) sl.oninput=()=>syncSalary('lui',+sl.value);
  if(se) se.oninput=()=>syncSalary('elle',+se.value);

  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{S.settings.mode=b.dataset.mode; save(); go('pilotage');}));

  // Mode "Personnalisé aux revenus" : les 2 % sont complémentaires (toujours 100 au total).
  const ph=$('#prepHim'), pr=$('#prepHer');
  const syncCustomPct=(who,val)=>{
    val=Math.max(0, Math.min(100, Math.round(val)||0));
    if(who==='lui'){ S.settings.custom={lui:val, elle:100-val}; if(pr) pr.value=100-val; }
    else { S.settings.custom={lui:100-val, elle:val}; if(ph) ph.value=100-val; }
    save(); recalcPilotage();
  };
  if(ph) ph.oninput=()=>syncCustomPct('lui',+ph.value);
  if(pr) pr.oninput=()=>syncCustomPct('elle',+pr.value);
  const fl=$('#fixLui'), fe=$('#fixElle');
  if(fl) fl.oninput=()=>{S.settings.fixed.lui=Math.max(0,+fl.value||0); save(); recalcPilotage();};
  if(fe) fe.oninput=()=>{S.settings.fixed.elle=Math.max(0,+fe.value||0); save(); recalcPilotage();};

  const chgHdr=$('#chgHdr'); if(chgHdr) chgHdr.onclick=()=>{
    pilotOpen.charges=!pilotOpen.charges;
    chgHdr.classList.toggle('open',pilotOpen.charges);
    const list=$('#chgList'); if(list) list.style.display=pilotOpen.charges?'block':'none';
  };
  const catHdr=$('#catHdr'); if(catHdr) catHdr.onclick=()=>{
    pilotOpen.categories=!pilotOpen.categories;
    catHdr.classList.toggle('open',pilotOpen.categories);
    const list=$('#catList'); if(list) list.style.display=pilotOpen.categories?'block':'none';
  };
  document.querySelectorAll('[data-toggleperso]').forEach(b=>b.addEventListener('click',()=>{
    const who=b.dataset.toggleperso; pilotOpen['perso_'+who]=!pilotOpen['perso_'+who]; go('pilotage');
  }));
  document.querySelectorAll('[data-addpersocharge]').forEach(b=>b.addEventListener('click',()=>openAddCharge(b.dataset.addpersocharge)));
  const acat=$('#addCat'); if(acat) acat.onclick=()=>openEditCat(null);
  document.querySelectorAll('[data-editcat]').forEach(b=>b.addEventListener('click',()=>openEditCat(b.dataset.editcat)));
  const apr=$('#addProjPilot'); if(apr) apr.onclick=()=>openEditProject(null,'pilotage');
  document.querySelectorAll('[data-delcharge]').forEach(b=>b.addEventListener('click',()=>{
    S.charges=S.charges.filter(x=>x.id!==b.dataset.delcharge); save(); go('pilotage'); toast("Charge supprimée 🗑");
  }));
  document.querySelectorAll('[data-editproject]').forEach(b=>b.addEventListener('click',ev=>{ ev.stopPropagation(); openEditProject(b.dataset.editproject,'pilotage'); }));

  const en=$('#effNow'), enx=$('#effNext');
  if(en) en.onclick=()=>{en.classList.add('on'); enx.classList.remove('on');};
  if(enx) enx.onclick=()=>{enx.classList.add('on'); en.classList.remove('on');};

  const vb=$('#validBudget'); if(vb) vb.onclick=()=>{
    // Pendant la simulation, tous les chiffres saisis (dans chaque mode) restent en mémoire
    // pour permettre de comparer librement. À la validation finale, on ne garde que ce qui
    // sert réellement au mode choisi : le reste est du "brouillon" qu'on peut nettoyer.
    if(S.settings.mode!=='custom') S.settings.custom={lui:50, elle:50};
    if(S.settings.mode!=='fixe') S.settings.fixed={lui:0, elle:0};
    if(S.settings.mode!=='net') S.charges=S.charges.filter(c=>c.scope!=='lui' && c.scope!=='elle');
    const eff=$('#effNext').classList.contains('on')?'futur':'immediate';
    S.budgetHistory.unshift({date:iso(0),label:`Budget validé pour ${monthLabel(eff==='futur'?1:0)}`,effect:eff});
    if(!S.moneyDate.nextDate){ const nd=new Date(); nd.setMonth(nd.getMonth()+1); S.moneyDate.nextDate=nd.toISOString().slice(0,10); }
    S.pilotFrozen=true;
    save(); toast("Budget validé ✓ — vous êtes prêts !","❤️");
    go('pilotage');
  };
  const uf=$('#unfreezeBudget'); if(uf) uf.onclick=()=>{ S.pilotFrozen=false; save(); go('pilotage'); };
}
function openAddCharge(defaultScope){
  const scope=defaultScope||'commune';
  // Le scope est déjà déterminé par le contexte (carte de la personne ou section
  // "communes") : pas besoin de le redemander. Formulaire réduit au strict utile.
  // La classification (règle 50/30/20) n'a de sens que pour les charges communes.
  const isCommune=scope==='commune';
  openModal(`<h3>${isCommune?'Nouvelle charge fixe commune':'Nouvelle charge perso'}</h3>
    <div class="field"><label>Nom</label><input class="input" id="chN" placeholder="Ex : Netflix"></div>
    <div class="field"><label>Montant /mois</label><input class="input" type="number" id="chA" placeholder="15"></div>
    ${isCommune?`<div class="field"><label>Classification (règle 50/30/20)</label>
      <div class="grid2" style="gap:8px">
        ${["besoin","envie","invest","protection"].map(cl=>`<button class="cat-opt clsPick" data-cls="${cl}"><span class="tag ${cl}">${clsLabel(cl)}</span></button>`).join('')}
      </div>
    </div>`:''}
    <button class="btn btn-primary" id="chSave" style="margin-top:6px">Ajouter</button>`, true);
  let cls=null;
  document.querySelectorAll('.clsPick').forEach(b=>b.addEventListener('click',()=>{cls=b.dataset.cls; document.querySelectorAll('.clsPick').forEach(x=>x.classList.remove('on')); b.classList.add('on');}));
  $('#chSave').onclick=()=>{
    const n=$('#chN').value.trim(); if(!n){toast("Nom requis","✏️");return;}
    if(isCommune && !cls){ toast("Choisissez une classification","🏷️"); return; }
    S.charges.push({id:e(),emoji:'📄',name:n,amount:+$('#chA').value||0,scope,locked:false,cls:isCommune?cls:undefined});
    save(); closeModal(); go('pilotage'); toast("Charge ajoutée");
  };
}
function openEditCat(id, returnTo){
  returnTo = returnTo || 'pilotage';
  const c=id?catById(id):{emoji:"📦",name:"",budget:0,cls:null};
  openModal(`<h3>${id?'Modifier la catégorie':'Nouvelle catégorie'}</h3>
    <div class="field"><label>Nom</label><input class="input" id="ceN" value="${escapeHtml(c.name)}" placeholder="Ex : Animaux"></div>
    <div class="field"><label>Budget mensuel</label><input class="input" type="number" id="ceB" value="${c.budget}"></div>
    <p class="small muted" style="margin:-6px 2px 12px">L'hebdomadaire est calculé automatiquement : <b>${fmt0((c.budget||0)/4)} / semaine</b></p>
    <div class="field"><label>Classification (règle 50/30/20)</label>
      <div class="grid2" style="gap:8px">
        ${["besoin","envie","invest","protection"].map(cl=>`<button class="cat-opt clsPick ${c.cls===cl?'on':''}" data-cls="${cl}"><span class="tag ${cl}">${clsLabel(cl)}</span></button>`).join('')}
      </div>
    </div>
    <div class="row" style="gap:10px; margin-top:6px"><button class="btn btn-primary" id="ceSave" style="flex:1">Enregistrer</button>
    ${id?`<button class="btn btn-ghost btn-sm" id="ceDel" style="color:var(--danger)">🗑</button>`:''}</div>`, true);
  let cls=c.cls;
  document.querySelectorAll('.clsPick').forEach(b=>b.addEventListener('click',()=>{cls=b.dataset.cls; document.querySelectorAll('.clsPick').forEach(x=>x.classList.remove('on')); b.classList.add('on');}));
  $('#ceSave').onclick=()=>{ const n=$('#ceN').value.trim(); if(!n){toast("Nom requis","✏️");return;}
    if(!cls){ toast("Choisissez une classification","🏷️"); return; }
    if(id){ c.name=n; c.budget=+$('#ceB').value||0; c.cls=cls; }
    else { S.categories.push({id:e(),emoji:'📦',name:n,budget:+$('#ceB').value||0,cls:cls}); }
    save(); closeModal(); go(returnTo); toast("Catégorie enregistrée"); };
  const del=$('#ceDel'); if(del) del.onclick=()=>{ S.categories=S.categories.filter(x=>x.id!==id); save(); closeModal(); go(returnTo); toast("Catégorie supprimée 🗑"); };
}

/* ============================================================
   BOOT
   ============================================================ */
save();

// Lien de réinitialisation de mot de passe : Supabase ouvre l'app avec un événement de récupération
let recovering = /type=recovery/.test(location.hash);
if(recovering){ $('#main').classList.add('hidden'); $('#auth').classList.remove('hidden'); authStep="recovery"; renderAuth(); }
sb.auth.onAuthStateChange((event,session)=>{
  if(event==='PASSWORD_RECOVERY'){ recovering=true; $('#main').classList.add('hidden'); $('#auth').classList.remove('hidden'); authStep="recovery"; renderAuth(); return; }
  if(event==='SIGNED_IN' && session && !recovering){ enterWithSession(session.user); }
  if(event==='SIGNED_OUT'){ $('#main').classList.add('hidden'); $('#auth').classList.remove('hidden'); authStep="login"; renderAuth(); }
});

(async function boot(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session && !recovering){ await enterWithSession(session.user); }
    else if(!recovering){ renderAuth(); }
  }catch(e){ console.error(e); renderAuth(); }
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
</script>
